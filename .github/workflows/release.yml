name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Capix Code ${{ github.ref_name }}
          body: |
            ## Capix Code ${{ github.ref_name }}

            A fork of [opencode](https://github.com/anomalyco/opencode) with a built-in Capix LLM provider — the CLI coding assistant for the Capix network.

            ### Install

            ```bash
            curl -fsSL https://capix.network/install-code.sh | bash
            ```

            Or download the appropriate binary for your platform below.

            ### Quick start

            ```bash
            export CAPIX_BASE_URL=https://capix.network/api/v1
            export CAPIX_API_KEY=cpk_...
            capix-code
            ```
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout capix-code repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Clone + rebrand opencode
        run: ./scripts/bootstrap.sh
        shell: bash

      - name: Build standalone binary
        run: ./scripts/build.sh
        shell: bash

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capix-code-${{ matrix.platform }}-${{ matrix.arch }}
          path: opencode/packages/opencode/dist/*/bin/capix-code*

  publish:
    name: Upload binaries to release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/capix-code*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
